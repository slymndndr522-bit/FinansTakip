<!DOCTYPE html><html lang="tr"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"><title>FinansTakip</title><style>*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}:root{--bg:#0e0f13;--surface:#16181f;--surface2:#1e2029;--border:#2a2d38;--gold:#c9a84c;--gold-light:#e8c97a;--green:#4caf85;--red:#e05c5c;--blue:#2ab8c4;--debt:#e05c5c;--mandatory:#e8874a;--other:#9b7fe8;--text:#e8e9ed;--muted:#6b7080;--accent:#3a7bd5;}html,body{height:100%}body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;-webkit-text-size-adjust:100%}header{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap;background:var(--surface)}.logo{font-size:1.2rem;font-weight:700;color:var(--gold);letter-spacing:-0.5px}.logo span{color:var(--text);font-weight:400}.hbtns{display:flex;gap:6px;flex-wrap:wrap}</style></head><body><div id="loading"><div class="spin"></div><div style="color:var(--muted);font-size:0.82rem">Yükleniyor...</div></div>/option><option value="10">Ekim</option><option value="11">Kasım</option><option value="12">Aralık</option></select><select id="selY" onchange="render()"></select></div><div class="main-tabs"><div class="main-tab tab-income on" id="tab-income" onclick="goTab('income')">📈 Gelir</div><div class="main-tab tab-expense" id="tab-expense" onclick="goTab('expense')">📉 Gider</div><div class="main-tab tab-savings" id="tab-savings" onclick="goTab('savings')">💰 Birikim</div><div class="main-tab tab-overview" id="tab-overview" onclick="goTab('overview')">📊 Özet</div></div><div class="content"><div class="panel on" id="panel-income"><div class="sum-row sum2"><div class="sc sc-inc"><div class="sc-lbl">Toplam Gelir</div><div class="sc-val" id="si-inc">₺0</div></div><div class="sc sc-bal"><div class="sc-lbl">Net Bakiye</div><div class="sc-val" id="si-bal">₺0</div></div></div><div id="list-income"></div></div><div class="panel" id="panel-expense"><div class="sum-row sum3"><div class="sc sc-exp"><div class="sc-lbl">Toplam Gider</div><div class="sc-val" id="se-exp">₺0</div></div><div class="sc sc-inc"><div class="sc-lbl">Toplam Gelir</div><div class="sc-val" id="se-inc">₺0</div></div><div class="sc sc-bal"><div class="sc-lbl">Gelir-Gider</div><div class="sc-val" id="se-net">₺0</div></div></div><div id="list-debt"></div><div id="list-mand"></div><div id="list-other"></div></div><div class="panel" id="panel-savings"><div class="sum-row sum2"><div class="sc sc-sav"><div class="sc-lbl">Toplam Birikim</div><div class="sc-val" id="ss-sav">₺0</div></div><div class="sc sc-rate"><div class="sc-lbl">Tasarruf Oranı</div><div class="sc-val" id="ss-rate">—</div></div></div><div id="list-savings"></div></div></div><script>const DB='FinansTakip3',VER=1,ST='kv';let db=null;function openDB(){return new Promise((res)=>{const r=indexedDB.open(DB,VER);r.onupgradeneeded=e=>{const d=e.target.result;if(!d.objectStoreNames.contains(ST))d.createObjectStore(ST,{keyPath:'k'})};r.onsuccess=e=>{db=e.target.result;res()};r.onerror=()=>res()});}function dbGet(k){return new Promise((res)=>{if(!db){res(null);return}try{const tx=db.transaction(ST,'readonly');const req=tx.objectStore(ST).get(k);req.onsuccess=()=>res(req.result?req.result.v:null);req.onerror=()=>res(null)}catch(e){res(null)}});}function dbSet(k,v){return new Promise((res)=>{if(!db){res();return}try{const tx=db.transaction(ST,'readwrite');const req=tx.objectStore(ST).put({k,v});req.onsuccess=()=>res();req.onerror=()=>res()}catch(e){res()}});}const MN=['Ocak','Şubat','Mart','Nisan','Mayıs','Haziran','Temmuz','Ağustos','Eylül','Ekim','Kasım','Aralık'];const DEF_CATS={income:['Maaş','Serbest Meslek','Yatırım Getirisi','Kira Geliri','Prim/Bonus','Diğer'],debt:['Konut Kredisi','Taşıt Kredisi','Kredi Kartı','Kişisel Borç','Diğer'],mandatory:['Kira','Elektrik','Su','Doğalgaz','İnternet','Market','Ulaşım','Sağlık','Sigorta','Diğer'],other:['Restoran','Eğlence','Giyim','Hobi','Seyahat','Eğitim','Diğer'],savings:['Altın','Döviz','BES/Emeklilik','Hisse Senedi','Yatırım Fonu','Kripto','Vadeli Mevduat','Diğer']};let DATA={},CATS={},curTab='income',cType='income',cSec='debt';async function loadData(){try{const d=await dbGet('DATA');if(d)DATA=d;const c=await dbGet('CATS');if(c)CATS=c;else CATS=JSON.parse(JSON.stringify(DEF_CATS))}catch(e){DATA={};CATS=JSON.parse(JSON.stringify(DEF_CATS))}}async function saveData(){await dbSet('DATA',DATA);await dbSet('CATS',CATS)}function getPD(m,y){const k={String(m).padStart(2,‘0’)};if(!DATA[k])DATA[k]={income:[],debt:[],mandatory:[],other:[],savings:[]};['income','debt','mandatory','other','savings'].forEach(s=>{if(!DATA[k][s])DATA[k][s]=[]});if(DATA[k].expense){DATA[k].mandatory=[...DATA[k].mandatory,...DATA[k].expense];delete DATA[k].expense}return DATA[k]}const gm=()=>parseInt(document.getElementById('selM').value);const gy=()=>parseInt(document.getElementById('selY').value);const sum=a=>(a||[]).reduce((s,i)=>s+(i.amount||0),0);const f=n=>Number(n).toLocaleString('tr-TR',{minimumFractionDigits:2,maximumFractionDigits:2});const $=id=>document.getElementById(id);const set=(id,v)=>{const e=$(id);if(e)e.textContent=v};async function init(){try{await openDB()}catch(e){}await loadData();const now=new Date();$('selM').value=now.getMonth()+1;const yrs=\[\];for(let y=now.getFullYear()-4;y<=now.getFullYear()+1;y++)yrs.push(y);const yy=$('selY');yrs.forEach(y=>{const o=document.createElement('option');o.value=y;o.text=y;if(y===now.getFullYear())o.selected=true;yy.appendChild(o)});$('loading').style.display='none';render()}init().catch(e=>{$('loading').style.display='none';render()});</script></body></html>
