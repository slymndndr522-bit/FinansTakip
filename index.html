<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ORION AI - Finans Takip</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap');
        
        :root {
            --bg: #020408;
            --glass: rgba(10, 15, 30, 0.85);
            --border: rgba(255, 255, 255, 0.1);
            --orion-blue: #3a86ff;
            --orion-purple: #8338ec;
            --text: #f8f9fa;
            --green: #06d6a0;
            --red: #ef476f;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { 
            background: var(--bg); color: var(--text); font-family: 'Syne', sans-serif; 
            min-height: 100vh; overflow-x: hidden;
            background-image: radial-gradient(circle at 80% 10%, rgba(58,134,255,0.15), transparent),
                             radial-gradient(circle at 10% 90%, rgba(131,56,236,0.15), transparent);
        }

        .star-man {
            position: fixed; bottom: -20px; right: -30px; width: 220px; height: 350px;
            background: linear-gradient(to top, var(--bg), transparent), 
                        url('https://raw.githubusercontent.com/slymndndr522-bit/FinansTakip/main/orion-silhouette.png') no-repeat center;
            background-size: contain; opacity: 0.25; pointer-events: none; z-index: 0; filter: drop-shadow(0 0 15px var(--orion-blue));
        }

        header { padding: 25px; background: var(--glass); backdrop-filter: blur(25px); border-bottom: 1px solid var(--border); text-align: center; position: sticky; top: 0; z-index: 100; }
        .logo { font-weight: 800; letter-spacing: 5px; font-size: 1.5rem; }
        .logo span { color: var(--orion-blue); text-shadow: 0 0 15px var(--orion-blue); }

        .content { padding: 20px; position: relative; z-index: 1; max-width: 600px; margin: 0 auto; }
        .card { background: var(--glass); border: 1px solid var(--border); border-radius: 24px; padding: 25px; margin-bottom: 20px; backdrop-filter: blur(20px); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .card-title { font-size: 0.8rem; font-weight: 800; color: var(--orion-blue); margin-bottom: 20px; letter-spacing: 2px; text-transform: uppercase; }

        label { display: block; font-size: 0.7rem; color: var(--orion-blue); margin-bottom: 8px; font-weight: 800; }
        select, input { 
            width: 100%; background: rgba(255,255,255,0.05); border: 1px solid var(--border); 
            color: white; padding: 14px; border-radius: 15px; margin-bottom: 15px; font-family: 'Space Mono', monospace; font-size: 0.9rem;
        }

        .btn-add { 
            width: 100%; background: linear-gradient(45deg, var(--orion-blue), var(--orion-purple)); color: white; border: none; 
            padding: 16px; border-radius: 15px; font-weight: 800; cursor: pointer; font-size: 1rem;
            box-shadow: 0 5px 20px rgba(58,134,255,0.4); transition: 0.3s;
        }

        .record-item { display: flex; justify-content: space-between; align-items: center; padding: 15px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .record-info { display: flex; flex-direction: column; gap: 4px; }
        .record-cat { font-weight: 800; font-size: 1rem; color: var(--text); }
        .record-sub { font-size: 0.7rem; color: rgba(255,255,255,0.5); font-family: 'Space Mono', monospace; }
        
        .record-actions { display: flex; align-items: center; gap: 15px; }
        .amt-val { font-family: 'Space Mono', monospace; font-weight: 700; font-size: 1rem; }
        .btn-del { color: var(--red); background: none; border: none; font-size: 1.3rem; cursor: pointer; padding: 5px; }

        .summary-row { display: flex; justify-content: space-between; padding: 10px 0; font-size: 0.9rem; font-weight: 700; }
        .summary-total { border-top: 1px solid var(--orion-blue); margin-top: 15px; padding-top: 15px; font-weight: 800; font-size: 1.1rem; }
    </style>
</head>
<body>

<div class="star-man"></div>

<header><div class="logo">ORION <span>AI</span></div></header>

<div class="content">
    <div class="card">
        <div class="card-title">YENİ İŞLEM KAYDI</div>
        <label>ANA KATEGORİ</label>
        <select id="mainCat">
            <option value="Gelir">Gelir</option>
            <option value="Gider">Gider</option>
            <option value="Birikim">Birikim</option>
        </select>
        
        <label>AÇIKLAMA</label>
        <input type="text" id="desc" placeholder="Örn: Market, Maaş...">

        <label>TUTAR (₺)</label>
        <input type="number" id="amount" placeholder="0.00">

        <button class="btn-add" onclick="addRecord()">KAYDET</button>
    </div>

    <div class="card">
        <div class="card-title">MALİ ÖZET</div>
        <div id="summary"></div>
    </div>

    <div class="card">
        <div class="card-title">İŞLEM GEÇMİŞİ</div>
        <div id="list"></div>
    </div>
</div>

<script>
    let data = JSON.parse(localStorage.getItem('orion_fin_v1') || '[]');

    function addRecord() {
        const main = document.getElementById('mainCat').value;
        const desc = document.getElementById('desc').value;
        const amt = document.getElementById('amount').value;
        
        if(!desc || !amt) return;

        data.push({ main, desc, amt: parseFloat(amt) });
        localStorage.setItem('orion_fin_v1', JSON.stringify(data));
        
        document.getElementById('desc').value = '';
        document.getElementById('amount').value = '';
        render();
    }

    function deleteRecord(i) {
        data.splice(i, 1);
        localStorage.setItem('orion_fin_v1', JSON.stringify(data));
        render();
    }

    function render() {
        const list = document.getElementById('list');
        list.innerHTML = data.map((r, i) => `
            <div class="record-item">
                <div class="record-info">
                    <span class="record-cat">${r.desc}</span>
                    <span class="record-sub">${r.main}</span>
                </div>
                <div class="record-actions">
                    <span class="amt-val" style="color:${r.main==='Gelir'?'var(--green)':'var(--red)'}">
                        ${r.main==='Gelir'?'+':'-'}₺${r.amt.toLocaleString('tr-TR')}
                    </span>
                    <button class="btn-del" onclick="deleteRecord(${i})">✕</button>
                </div>
            </div>
        `).reverse().join('');

        let total = 0;
        data.forEach(r => {
            if(r.main === 'Gelir') total += r.amt;
            else total -= r.amt;
        });

        document.getElementById('summary').innerHTML = `
            <div class="summary-row">
                <span>Net Durum:</span>
                <span style="color:${total >= 0 ? 'var(--green)' : 'var(--red)'}">
                    ₺${total.toLocaleString('tr-TR')}
                </span>
            </div>
        `;
    }

    render();
</script>
</body>
</html>
