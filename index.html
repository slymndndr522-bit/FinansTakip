<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ORION Finans Takip v3.5</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Roboto+Mono:wght@400;700&display=swap');
        
        :root {
            --bg: #050810;
            --surface: #0F1423;
            --border: #1E263F;
            --orion-blue: #3A86FF;
            --green: #06D6A0;
            --red: #EF476F;
            --text-primary: #F8F9FA;
            --text-secondary: #8E9AAF;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text-primary); font-family: 'Inter', sans-serif; min-height: 100vh; padding: 20px; padding-bottom: 100px; }

        .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 18px; margin-bottom: 20px; }
        .card-title { font-size: 0.8rem; font-weight: 800; color: var(--orion-blue); margin-bottom: 15px; text-transform: uppercase; letter-spacing: 1px; }

        /* Form Elemanları */
        .form-group { margin-bottom: 12px; }
        label { display: block; font-size: 0.7rem; color: var(--text-secondary); margin-bottom: 5px; font-weight: 600; }
        select, input { 
            width: 100%; background: var(--bg); border: 1px solid var(--border); 
            color: var(--text-primary); padding: 10px; border-radius: 8px; font-family: 'Inter', sans-serif; font-size: 0.9rem;
        }

        button.btn-add { 
            width: 100%; background: var(--orion-blue); color: white; border: none; 
            padding: 12px; border-radius: 8px; font-weight: 700; margin-top: 10px; cursor: pointer;
        }

        /* Liste Elemanları ve Düzenleme Butonları */
        .record-item { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 10px 0; border-bottom: 1px solid var(--border); 
        }
        .record-info { display: flex; flex-direction: column; }
        .record-cat { font-size: 0.85rem; font-weight: 700; }
        .record-desc { font-size: 0.7rem; color: var(--text-secondary); }
        
        .record-actions { display: flex; align-items: center; gap: 8px; }
        .amount { font-family: 'Roboto Mono', monospace; font-weight: 700; margin-right: 10px; }
        
        .btn-edit { color: var(--orion-blue); background: none; border: none; font-size: 1.1rem; cursor: pointer; }
        .btn-delete { color: var(--red); background: none; border: none; font-size: 1.1rem; cursor: pointer; }

        /* Özet Tablosu */
        .summary-row { display: flex; justify-content: space-between; padding: 8px 0; font-size: 0.9rem; }
        .summary-total { border-top: 2px solid var(--border); margin-top: 10px; padding-top: 10px; font-weight: 800; }
        .devreden { color: var(--green); }
        .gider-text { color: var(--red); }
    </style>
</head>
<body>

<div class="card">
    <div class="logo" style="font-weight: 800; font-size: 1.2rem; margin-bottom: 20px; text-align: center;">ORION <span>FINANS</span></div>
    
    <div class="form-group">
        <label>İşlem Tipi</label>
        <select id="mainCat" onchange="updateSubCats()">
            <option value="Gelir">Gelir</option>
            <option value="Borç">Borç</option>
            <option value="Zorunlu">Zorunlu Harcama</option>
            <option value="Diğer">Diğer Harcamalar</option>
            <option value="Birikim">Birikim</option>
        </select>
    </div>

    <div class="form-group">
        <label>Alt Başlık</label>
        <select id="subCat"></select>
    </div>

    <div class="form-group">
        <label>Tutar (TL)</label>
        <input type="number" id="amount" placeholder="0.00">
    </div>

    <div class="form-group">
        <label>Açıklama (Opsiyonel)</label>
        <input type="text" id="description" placeholder="Not ekleyin...">
    </div>

    <button class="btn-add" onclick="addRecord()">KAYDET</button>
</div>

<div class="card">
    <div class="card-title">Özet Raporu</div>
    <div id="summaryContent"></div>
</div>

<div class="card">
    <div class="card-title">İşlem Kayıtları</div>
    <div id="recordList"></div>
</div>

<script>
    let records = JSON.parse(localStorage.getItem('orion_finance_data') || '[]');
    let editIndex = -1;

    const subCategories = {
        'Gelir': ['Maaş', 'Ek Gelir', 'Kira Geliri', 'Diğer'],
        'Borç': ['Kredi', 'Şahıs Borcu', 'Banka Faizi', 'Diğer'],
        'Zorunlu': ['Kira', 'Aidat', 'Elektrik Faturası', 'Doğalgaz Faturası', 'Su Faturası', 'Telefon faturası', 'İnternet Faturası', 'Eğitim Harcamaları', 'Dijital Platform Üyelikleri', 'Akaryakıt', 'Araç Bakımı', 'Araç Muayenesi', 'MTV', 'Diğer'],
        'Diğer': ['Market', 'Manav', 'Kuruyemiş', 'Ulaşım', 'Giyim', 'Çocuk Giyim', 'Kişisel Bakım', 'Elektronik Alışveriş', 'Usta', 'Yapı Dekorasyon', 'Diğer'],
        'Birikim': ['Altın', 'Döviz', 'Borsa', 'BES', 'Diğer']
    };

    function updateSubCats() {
        const main = document.getElementById('mainCat').value;
        const sub = document.getElementById('subCat');
        sub.innerHTML = subCategories[main].map(c => `<option value="${c}">${c}</option>`).join('');
    }

    function addRecord() {
        const amt = document.getElementById('amount').value;
        if(!amt) return alert("Lütfen tutar giriniz.");

        const record = {
            main: document.getElementById('mainCat').value,
            sub: document.getElementById('subCat').value,
            amount: parseFloat(amt),
            desc: document.getElementById('description').value || ""
        };

        if(editIndex > -1) {
            records[editIndex] = record;
            editIndex = -1;
        } else {
            records.push(record);
        }

        saveAndRender();
        document.getElementById('amount').value = '';
        document.getElementById('description').value = '';
    }

    function deleteRecord(index) {
        records.splice(index, 1);
        saveAndRender();
    }

    function editRecord(index) {
        const r = records[index];
        document.getElementById('mainCat').value = r.main;
        updateSubCats();
        document.getElementById('subCat').value = r.sub;
        document.getElementById('amount').value = r.amount;
        document.getElementById('description').value = r.desc;
        editIndex = index;
        window.scrollTo(0,0);
    }

    function saveAndRender() {
        localStorage.setItem('orion_finance_data', JSON.stringify(records));
        renderRecords();
        renderSummary();
    }

    function renderRecords() {
        const list = document.getElementById('recordList');
        list.innerHTML = records.map((r, i) => `
            <div class="record-item">
                <div class="record-info">
                    <span class="record-cat">${r.main} - ${r.sub}</span>
                    <span class="record-desc">${r.desc}</span>
                </div>
                <div class="record-actions">
                    <span class="amount" style="color: ${r.main === 'Gelir' ? 'var(--green)' : 'var(--red)'}">
                        ${r.main === 'Gelir' ? '+' : '-'}₺${r.amount.toLocaleString('tr-TR')}
                    </span>
                    <button class="btn-edit" onclick="editRecord(${i})">✎</button>
                    <button class="btn-delete" onclick="deleteRecord(${i})">✕</button>
                </div>
            </div>
        `).reverse().join('');
    }

    function renderSummary() {
        let totals = { Gelir: 0, Borç: 0, Zorunlu: 0, Diğer: 0, Birikim: 0 };
        records.forEach(r => totals[r.main] += r.amount);

        const toplamGider = totals.Borç + totals.Zorunlu + totals.Diğer + totals.Birikim;
        const kalan = totals.Gelir - toplamGider;

        document.getElementById('summaryContent').innerHTML = `
            <div class="summary-row"><span>Toplam Gelir:</span><span class="devreden">₺${totals.Gelir.toLocaleString('tr-TR')}</span></div>
            <div class="summary-row"><span>Toplam Gider:</span><span class="gider-text">₺${toplamGider.toLocaleString('tr-TR')}</span></div>
            <div class="summary-row summary-total">
                <span>Sonraki Aya Devreden:</span>
                <span class="devreden">₺${kalan.toLocaleString('tr-TR')}</span>
            </div>
        `;
    }

    updateSubCats();
    saveAndRender();
</script>

</body>
</html>
