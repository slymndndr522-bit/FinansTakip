<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ORION AI - Finans Takip</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap');
        
        :root {
            --bg: #020408;
            --glass: rgba(10, 15, 30, 0.85);
            --border: rgba(255, 255, 255, 0.1);
            --orion-blue: #3a86ff;
            --text: #f8f9fa;
            --green: #06d6a0;
            --red: #ef476f;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { 
            background: var(--bg); color: var(--text); font-family: 'Syne', sans-serif; 
            min-height: 100vh; overflow-x: hidden;
            background-image: radial-gradient(circle at 80% 10%, rgba(58,134,255,0.15), transparent);
        }

        .star-man {
            position: fixed; bottom: -20px; right: -30px; width: 200px; height: 300px;
            background: linear-gradient(to top, var(--bg), transparent), 
                        url('https://raw.githubusercontent.com/slymndndr522-bit/FinansTakip/main/orion-silhouette.png') no-repeat center;
            background-size: contain; opacity: 0.2; pointer-events: none; z-index: 0;
        }

        header { padding: 20px; background: var(--glass); border-bottom: 1px solid var(--border); text-align: center; }
        .logo { font-weight: 800; letter-spacing: 3px; font-size: 1.2rem; }
        .logo span { color: var(--orion-blue); text-shadow: 0 0 10px var(--orion-blue); }

        .content { padding: 15px; position: relative; z-index: 1; }
        .card { background: var(--glass); border: 1px solid var(--border); border-radius: 20px; padding: 20px; margin-bottom: 15px; backdrop-filter: blur(20px); }
        .card-title { font-size: 0.75rem; font-weight: 800; color: var(--orion-blue); margin-bottom: 15px; letter-spacing: 1px; text-transform: uppercase; }

        label { display: block; font-size: 0.7rem; color: var(--orion-blue); margin-bottom: 5px; font-weight: 700; }
        select, input { 
            width: 100%; background: rgba(255,255,255,0.05); border: 1px solid var(--border); 
            color: white; padding: 12px; border-radius: 12px; margin-bottom: 12px; font-family: 'Space Mono', monospace;
        }

        .btn-add { 
            width: 100%; background: var(--orion-blue); color: white; border: none; 
            padding: 15px; border-radius: 12px; font-weight: 800; cursor: pointer;
            box-shadow: 0 5px 15px rgba(58,134,255,0.3);
        }

        .record-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .record-info { display: flex; flex-direction: column; }
        .record-cat { font-weight: 700; font-size: 0.9rem; }
        .record-sub { font-size: 0.65rem; color: rgba(255,255,255,0.5); }
        
        .record-actions { display: flex; align-items: center; gap: 10px; }
        .amt-val { font-family: 'Space Mono', monospace; font-weight: 700; }
        .btn-edit { color: var(--orion-blue); background: none; border: none; font-size: 1.1rem; }
        .btn-del { color: var(--red); background: none; border: none; font-size: 1.1rem; }

        .summary-row { display: flex; justify-content: space-between; padding: 8px 0; font-size: 0.85rem; }
        .summary-total { border-top: 1px solid var(--orion-blue); margin-top: 10px; padding-top: 10px; font-weight: 800; }
    </style>
</head>
<body>

<div class="star-man"></div>

<header><div class="logo">ORION <span>AI</span></div></header>

<div class="content">
    <div class="card">
        <div class="card-title">İŞLEM GİRİŞİ</div>
        <label>Kategori</label>
        <select id="mainCat" onchange="updateSubCats()">
            <option value="Gelir">Gelir</option>
            <option value="Borç">Borç</option>
            <option value="Zorunlu">Zorunlu Harcama</option>
            <option value="Diğer">Diğer Harcamalar</option>
            <option value="Birikim">Birikim</option>
        </select>
        
        <label>Alt Başlık</label>
        <select id="subCat"></select>

        <label>Tutar (₺)</label>
        <input type="number" id="amount" placeholder="0.00">

        <label>Açıklama (Opsiyonel)</label>
        <input type="text" id="desc" placeholder="...">

        <button class="btn-add" id="saveBtn" onclick="saveRecord()">KAYDET</button>
    </div>

    <div class="card">
        <div class="card-title">ÖZET (DEVREDEN TUTAR)</div>
        <div id="summary"></div>
    </div>

    <div class="card">
        <div class="card-title">GEÇMİŞ İŞLEMLER</div>
        <div id="list"></div>
    </div>
</div>

<script>
    let data = JSON.parse(localStorage.getItem('orion_fin_v5') || '[]');
    let editId = -1;

    const subs = {
        'Gelir': ['Maaş', 'Ek Gelir', 'Kira Geliri', 'Diğer'],
        'Borç': ['Kredi', 'Şahıs Borcu', 'Banka Faizi', 'Diğer'],
        'Zorunlu': ['Kira', 'Aidat', 'Elektrik Faturası', 'Doğalgaz Faturası', 'Su Faturası', 'Telefon Faturası', 'İnternet Faturası', 'Eğitim Harcamaları', 'Dijital Platform Üyelikleri', 'Akaryakıt', 'Araç Bakımı', 'Araç Muayenesi', 'MTV', 'Diğer'],
        'Diğer': ['Market', 'Manav', 'Kuruyemiş', 'Ulaşım', 'Giyim', 'Çocuk Giyim', 'Kişisel Bakım', 'Elektronik Alışveriş', 'Usta', 'Yapı Dekorasyon', 'Diğer'],
        'Birikim': ['Altın', 'Döviz', 'Borsa', 'BES', 'Diğer']
    };

    function updateSubCats() {
        const m = document.getElementById('mainCat').value;
        document.getElementById('subCat').innerHTML = subs[m].map(s => `<option value="${s}">${s}</option>`).join('');
    }

    function saveRecord() {
        const amt = document.getElementById('amount').value;
        if(!amt) return;

        const obj = {
            main: document.getElementById('mainCat').value,
            sub: document.getElementById('subCat').value,
            amt: parseFloat(amt),
            desc: document.getElementById('desc').value || ""
        };

        if(editId > -1) { data[editId] = obj; editId = -1; document.getElementById('saveBtn').innerText="KAYDET"; }
        else { data.push(obj); }

        localStorage.setItem('orion_fin_v5', JSON.stringify(data));
        document.getElementById('amount').value = '';
        document.getElementById('desc').value = '';
        render();
    }

    function edit(i) {
        const r = data[i];
        document.getElementById('mainCat').value = r.main;
        updateSubCats();
        document.getElementById('subCat').value = r.sub;
        document.getElementById('amount').value = r.amt;
        document.getElementById('desc').value = r.desc;
        editId = i;
        document.getElementById('saveBtn').innerText = "GÜNCELLE";
        window.scrollTo(0,0);
    }

    function del(i) { data.splice(i, 1); localStorage.setItem('orion_fin_v5', JSON.stringify(data)); render(); }

    function render() {
        const list = document.getElementById('list');
        list.innerHTML = data.map((r, i) => `
            <div class="record-item">
                <div class="record-info">
                    <span class="record-cat">${r.sub}</span>
                    <span class="record-sub">${r.main} ${r.desc ? '• '+r.desc : ''}</span>
                </div>
                <div class="record-actions">
                    <span class="amt-val" style="color:${r.main==='Gelir'?'var(--green)':'var(--red)'}">
                        ${r.main==='Gelir'?'+':'-'}₺${r.amt.toLocaleString()}
                    </span>
                    <button class="btn-edit" onclick="edit(${i})">✎</button>
                    <button class="btn-del" onclick="del(${i})">✕</button>
                </div>
            </div>
        `).reverse().join('');

        let g = 0, h = 0;
        data.forEach(r => { if(r.main === 'Gelir') g += r.amt; else h += r.amt; });
        
        document.getElementById('summary').innerHTML = `
            <div class="summary-row"><span>Toplam Gelir:</span><span style="color:var(--green)">+₺${g.toLocaleString()}</span></div>
            <div class="summary-row"><span>Toplam Gider:</span><span style="color:var(--red)">-₺${h.toLocaleString()}</span></div>
            <div class="summary-row summary-total"><span>S. Aya Devreden:</span><span style="color:var(--orion-blue)">₺${(g-h).toLocaleString()}</span></div>
        `;
    }

    updateSubCats();
    render();
</script>
</body>
</html>
